<!DOCTYPE html>
<html>
<head>
    <title>Retail Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; margin: 20px; }

        .kpi-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .kpi {
            padding: 20px;
            border: 2px solid #4CAF50;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            font-size: 18px;
        }

        canvas {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h1>Retail Dashboard</h1>

<!-- KPIs -->
<div class="kpi-container">
    <div class="kpi"><b>Total Rows</b><br>{{ total }}</div>
    <div class="kpi"><b>Total Sales</b><br>${{ sales }}</div>
    <div class="kpi"><b>Avg Spend</b><br>${{ avg }}</div>
    <div class="kpi"><b>Total Units</b><br>{{ units }}</div>
</div>

<!-- Search -->
<form action="/search" method="get">
    <input name="hshd" placeholder="Enter Household ID" type="number">
    <button type="submit">Search</button>
</form>

<!-- BAR CHART -->
<h2>Sales by Department</h2>
<canvas id="deptChart"></canvas>

<!-- LINE CHART -->
<h2>Sales Over Time</h2>
<canvas id="timeChart"></canvas>

<!-- PIE CHART -->
<h2>Sales by Region</h2>
<canvas id="regionChart"></canvas>

<h2>Sample Data</h2>
{{ table|safe }}

<script>
// BAR CHART
new Chart(document.getElementById('deptChart'), {
    type: 'bar',
    data: {
        labels: {{ labels|safe }},
        datasets: [{
            label: 'Sales ($)',
            data: {{ values|safe }},
        }]
    }
});

// LINE CHART
new Chart(document.getElementById('timeChart'), {
    type: 'line',
    data: {
        labels: {{ time_labels|safe }},
        datasets: [{
            label: 'Sales Over Time',
            data: {{ time_values|safe }},
            fill: false,
            tension: 0.1
        }]
    }
});

// PIE CHART
new Chart(document.getElementById('regionChart'), {
    type: 'pie',
    data: {
        labels: {{ region_labels|safe }},
        datasets: [{
            data: {{ region_values|safe }},
        }]
    }
});
</script>

</body>
</html>
