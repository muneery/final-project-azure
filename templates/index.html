<!DOCTYPE html>
<html>
<head>
    <title>Retail Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; margin: 20px; }

        .kpi-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .kpi {
            padding: 20px;
            border: 2px solid #4CAF50;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            font-size: 18px;
        }

        canvas {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>Retail Dashboard</h1>

<!-- KPIs -->
<div class="kpi-container">
    <div class="kpi">
        <b>Total Rows</b><br>{{ total }}
    </div>
    <div class="kpi">
        <b>Total Sales</b><br>${{ sales }}
    </div>
    <div class="kpi">
        <b>Avg Spend</b><br>${{ avg }}
    </div>
    <div class="kpi">
        <b>Total Units</b><br>{{ units }}
    </div>
</div>

<!-- Search -->
<form action="/search" method="get">
    <input name="hshd" placeholder="Enter Household ID" type="number">
    <button type="submit">Search</button>
</form>

<!-- CHART -->
<h2>Sales by Department</h2>
<canvas id="deptChart" width="600" height="200"></canvas>

<h2>Sample Data</h2>
{{ table|safe }}

<!-- CHART SCRIPT -->
<script>
const ctx = document.getElementById('deptChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: {{ labels|safe }},
        datasets: [{
            label: 'Sales ($)',
            data: {{ values|safe }},
        }]
    },
    options: {
        responsive: true
    }
});
</script>

</body>
</html>
