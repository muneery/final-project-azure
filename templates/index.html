<!DOCTYPE html>
<html>
<head>
    <title>Retail Dashboard</title>
    <style>
        body { font-family: Arial; margin: 20px; }

        .kpi-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .kpi {
            padding: 20px;
            border: 2px solid #4CAF50;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            font-size: 18px;
        }

        h1 { margin-bottom: 10px; }
    </style>
</head>
<body>

<h1>Retail Dashboard</h1>

<!-- KPIs -->
<div class="kpi-container">
    <div class="kpi">
        <b>Total Rows</b><br>{{ total }}
    </div>
    <div class="kpi">
        <b>Total Sales</b><br>${{ sales }}
    </div>
    <div class="kpi">
        <b>Avg Spend</b><br>${{ avg }}
    </div>
    <div class="kpi">
        <b>Total Units</b><br>{{ units }}
    </div>
</div>

<!-- Search -->
<form action="/search" method="get">
    <input name="hshd" placeholder="Enter Household ID" type="number">
    <button type="submit">Search</button>
</form>

<h2>Sample Data</h2>
{{ table|safe }}

</body>
</html>
